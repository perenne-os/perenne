<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500" role="img" aria-label="Perenne">
  <title>Perenne</title>
  <defs>
    <radialGradient id="glow" cx="50%" cy="52%" r="52%">
      <stop offset="0%" stop-color="#12261D"/>
      <stop offset="100%" stop-color="#0C1210"/>
    </radialGradient>
    <radialGradient id="sprout-glow" cx="50%" cy="54%" r="34%">
      <stop offset="0%" stop-color="#63D89C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#63D89C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- botanical-ink field -->
  <rect width="500" height="500" rx="110" fill="url(#glow)"/>
  <circle cx="250" cy="255" r="150" fill="url(#sprout-glow)"/>

  <!-- the renewal cycle: an open ring (jade season + amber die-back), two gaps = it never fully closes -->
  <g fill="none" stroke-linecap="round" transform="rotate(-90 250 250)">
    <circle cx="250" cy="250" r="150" stroke="#63D89C" stroke-width="12"
            stroke-dasharray="660 282"/>
    <circle cx="250" cy="250" r="150" stroke="#E8A44C" stroke-width="12"
            stroke-dasharray="180 762" stroke-dashoffset="-711"/>
  </g>

  <!-- the sprout — same mark as the site favicon, scaled up -->
  <g transform="translate(106 106) scale(9)" stroke-linecap="round">
    <path d="M16 29V13" fill="none" stroke="#63D89C" stroke-width="2.4"/>
    <path d="M16 17C16 12 12 9 6 9c0 6 4 8 10 8z" fill="#63D89C"/>
    <path d="M16 14c0-5 4-8 10-8 0 6-4 8-10 8z" fill="#3FA876"/>
  </g>

  <!-- amber seed at the base -->
  <circle cx="250" cy="367" r="12" fill="#E8A44C"/>
</svg>
